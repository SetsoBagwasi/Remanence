<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Remanence</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="header">
  <header style="display:flex;align-items:center;max-width:1300px;margin:0 auto;width:100%;padding:0 20px;">
    <img src="Images/Logo.png" alt="Remanence Logo" style="width:90px;height:auto;">
  </header>
</div>
<div class="nav">
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid" style="max-width:1300px;margin:0 auto;">
    <a class="navbar-brand" href="index.html">Remanence</a>
    <div style="display:flex;align-items:center;gap:16px;margin-left:auto;">
      <a class="nav-link" href="cart.html" style="font-size:20px;">🛒 <span class="cart-badge">0</span></a>
    </div>
  </div>
</nav>
</div>

<div style="min-height:70vh;display:flex;align-items:center;padding:40px 20px;background:var(--cream);">
  <div style="max-width:480px;width:100%;margin:0 auto;">
    <!-- Tab Toggle -->
    <div style="display:flex;background:white;border-radius:10px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:4px;">
      <button id="tab-login" onclick="showTab('login')" style="flex:1;padding:16px;border:none;background:var(--dark-green);color:white;font-family:'Jost',sans-serif;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:0.2s;">Login</button>
      <button id="tab-register" onclick="showTab('register')" style="flex:1;padding:16px;border:none;background:white;color:#888;font-family:'Jost',sans-serif;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:0.2s;">Register</button>
    </div>

    <!-- Login Form -->
    <div id="form-login" class="auth-card">
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to your Remanence account</p>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="your@email.com">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Your password">
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="rememberMe">
        <label class="form-check-label" for="rememberMe" style="font-size:13px;color:#888;">Remember me</label>
      </div>
      <button class="auth-btn" id="login-btn">Sign In</button>
      <p class="auth-switch">Don't have an account? <a href="#" onclick="showTab('register')">Create one</a></p>
    </div>

    <!-- Register Form -->
    <div id="form-register" class="auth-card" style="display:none;">
      <h2>Create Account</h2>
      <p class="subtitle">Join the Remanence family</p>
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" placeholder="Your full name">
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="reg-email" placeholder="your@email.com">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="reg-password" placeholder="Min. 6 characters">
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirm-password" placeholder="Repeat your password">
      </div>
      <button class="auth-btn" id="register-btn">Create Account</button>
      <p class="auth-switch">Already have an account? <a href="#" onclick="showTab('login')">Sign in</a></p>
    </div>

  </div>
</div>

<div class="footer"><footer>
  <div class="footer-bottom" style="border-top:none;padding-top:0;">
    <span>&copy; 2025 Remanence. All rights reserved.</span>
    <span>Made with ♥ in Botswana</span>
  </div>
</footer></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function showTab(tab) {
  const loginForm = document.getElementById('form-login');
  const registerForm = document.getElementById('form-register');
  const loginTab = document.getElementById('tab-login');
  const registerTab = document.getElementById('tab-register');
  if (tab === 'login') {
    loginForm.style.display = 'block'; registerForm.style.display = 'none';
    loginTab.style.background = 'var(--dark-green)'; loginTab.style.color = 'white';
    registerTab.style.background = 'white'; registerTab.style.color = '#888';
  } else {
    registerForm.style.display = 'block'; loginForm.style.display = 'none';
    registerTab.style.background = 'var(--dark-green)'; registerTab.style.color = 'white';
    loginTab.style.background = 'white'; loginTab.style.color = '#888';
  }
}
</script>
<script src="script.js"></script>
</body>
</html>
